<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookNest - Checkout</title>
  <!-- Khang krom kleng add css style yok mok brer  -->
  <link rel="stylesheet" href="style.css">
   
</head>
<body>

  <!-- Header -->
  <header>
    <h1>📚 BookNest</h1>
    <p>Your cozy corner for great books</p>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="Home.html">Home</a>
    <a href="about.html">About</a>
    <a href="sales.html">Sales</a>
    <a href="contact.html">Contact</a>
    <a href="checkout.html">Checkout</a>
  </nav>

  <!-- Main content -->
  <main>
    <h2 class="page-title">Checkout</h2>

    <h3 style="color:#2e7d32; margin-bottom:10px;">Your Cart</h3>
    <table>
      <tr>
        <th>Book</th>
        <th>Quantity</th>
        <th>Price</th>
      </tr>
      <tr>
        <td class="text-center">
          <img src="/Image/48 Laws of power.avif" alt="48 laws of power">
          The 40 Laws Of Power
        </td>
        <td>1</td>
        <td>$21.20</td>
      </tr>
      <tr>
        <td class="text-center">
          <img src="/Image/Hes Into her Season 1.avif" alt="He's Into Her Season 1">
          He's Into Her Season 1
        </td>
        <td>1</td>
        <td>$11.50</td>
      </tr>
      <tr class="total-row">
        <td>Total</td>
        <td>2</td>
        <td>$32.70</td>
      </tr>
    </table>
    <h3 style="color:#2e7d32; margin-bottom:10px;">Shipping & Payment</h3>
    <form>
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">

      <label for="address">Shipping Address</label>
      <input type="text" id="address" name="address" placeholder="Enter your address">

      <label for="card">Card Number</label>
      <input type="text" id="card" name="card" placeholder="1234 5678 9012 3456">

      <br><br>
      <button type="submit" class="btn">Place Order</button>
    </form>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 BookNest. Made by our team.</p>
    <p>Checkout page by SUN CHANVATHAKNA</p>
  </footer>

</body>
</html>
