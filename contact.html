<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookNest - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📚 BookNest</h1>
    <p>Your cozy corner for great books</p>
  </header>

  <nav>
    <a href="Home.html">Home</a>
    <a href="about.html">About</a>
    <a href="sales.html">Sales</a>
    <a href="contact.html">Contact</a>
    <a href="checkout.html">Checkout</a>
  </nav>
  <!-- Main content -->
  <main>
    <h2 class="page-title">Contact Us</h2>

    <div class="info-box">
      <p>📍 Address: Street 123, Phnom Penh, Cambodia</p>
      <p>📞 Phone: 012 345 678</p>
      <p>✉️ Email: hello@booknest.com</p>
    </div>

    <h3 style="color:#2e7d32; margin-bottom:10px;">Send us a message</h3>
    <form>
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name">

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email">

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Write your message here..."></textarea>

      <br><br>
      <button type="submit" class="btn">Send Message</button>
    </form>

  </main>


  <footer>
    <p>&copy; 2026 BookNest. Made by our team.</p>
    <p>Contact page by HORN SEYHAKAKARA</p>
  </footer>
